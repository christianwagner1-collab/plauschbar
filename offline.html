<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Offline – Freunde Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #000000;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    img {
      width: 120px;
      height: 120px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    p {
      font-size: 16px;
      max-width: 300px;
      line-height: 1.4;
      opacity: 0.8;
    }
    button {
      margin-top: 25px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #007aff;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background: #005bb5;
    }
  </style>
</head>
<body>
  <img src="icon-192.png" alt="App Icon">
  <h1>Du bist offline</h1>
  <p>Freunde Chat konnte keine Verbindung herstellen. Bitte überprüfe deine Internetverbindung.</p>
  <button onclick="location.reload()">Erneut versuchen</button>
</body>
</html>
