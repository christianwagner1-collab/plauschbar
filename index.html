<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Plausch Bar</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
    <img src="icon-192.png" alt="Chat Icon" style="width:80px; height:auto; margin-bottom:15px;">
    <h2>👋❤️Willkommen in der Plausch Bar 👋❤️</h2>
    <p>Bitte deinen Vornamen und PIN (Geburtsjahr) eingeben und auf Start drücken</p>
    <p>🔐🖕 Die Seite ist verschlüsselt 🖕🔐</p>

    <input id="usernameInput" type="text" placeholder="Dein Name">
    <input id="pinInput" type="password" maxlength="4" placeholder="Deine PIN (Geburtsjahr)">
    <button id="loginBtn">Start</button>
</div>

<!-- CHAT SCREEN -->
<div id="chatScreen" style="display:none;">

    <!-- SIDEBAR DESKTOP -->
    <div id="sidebarDesktop">

        <h3>📁 Gruppen</h3>
        <ul id="groupListDesktop"></ul>

        <h3>👤 Kontakte</h3>
        <ul id="userListDesktop"></ul>

    </div>

    <!-- CHAT AREA -->
    <div id="chatArea">

        <div id="chatHeader">
            <div>
                <div id="chatAvatar">👤</div>
                <div id="chatTitle">Chat</div>
            </div>
        </div>

        <div id="messages"></div>

        <div id="inputArea">

            <select id="emojiSelect">
                <option value="">🙂</option>
                <option value="😊">😊</option>
                <option value="😍">😍</option>
                <option value="😢">😢</option>
                <option value="😡">😡</option>
                <option value="👍">👍</option>
                <option value="👎">👎</option>
                <option value="🎉">🎉</option>
                <option value="🐱‍👤">🐱‍👤</option>
                <option value="❤️">❤️</option>
                <option value="🤡">🤡</option>
                <option value="🤮">🤮</option>
                <option value="🤢">🤢</option>
                <option value="😱">😱</option>
                <option value="💩">💩</option>
                <option value="😎">😎</option>
                <option value="😄">😄</option>
            </select>

            <input id="messageInput" placeholder="Nachricht…">

            <button id="sendBtn">➤</button>
        </div>

    </div>
</div>

<!-- SCRIPTS -->
<script src="/socket.io/socket.io.js"></script>
<script src="client.js?v=100001"></script>

</body>
</html>
