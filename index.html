<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plauschbar</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Styles -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }

        #topBar {
            background: #333;
            color: white;
            padding: 10px;
            font-size: 18px;
        }

        #connectionStatus {
            float: right;
        }

        #controls {
            padding: 10px;
            background: #ddd;
        }

        #chatLog {
            height: calc(100vh - 220px);
            overflow-y: auto;
            padding: 10px;
            background: white;
        }

        .msg-row {
            display: flex;
            margin-bottom: 10px;
        }

        .msg-row.me {
            justify-content: flex-end;
        }

        .avatar {
            font-size: 26px;
            margin-right: 8px;
        }

        .bubble {
            background: #e0e0e0;
            padding: 8px 12px;
            border-radius: 10px;
            max-width: 70%;
        }

        .bubble.me {
            background: #c0ffc0;
        }

        #bottomBar {
            padding: 10px;
            background: #ddd;
            display: flex;
            gap: 5px;
        }

        #messageInput {
            flex: 1;
            padding: 8px;
        }
    </style>
</head>

<body>

    <div id="topBar">
        Plauschbar
        <span id="connectionStatus">🔴 Getrennt</span>
    </div>

    <div id="controls">
        Dein Name:
        <select id="nicknameSelect">
            <option>Chris</option>
            <option>Täubchen</option>
            <option>Stefan</option>
            <option>Mike</option>
            <option>Eltern</option>
        </select>

        &nbsp;&nbsp; Chat mit:
        <select id="friendSelect">
            <option>Chris</option>
            <option>Täubchen</option>
            <option>Stefan</option>
            <option>Mike</option>
            <option>Eltern</option>
        </select>
    </div>

    <div id="chatLog"></div>

    <div id="bottomBar">
        <button id="emojiButton">😊</button>
        <input type="file" id="fileInput" />
        <input type="text" id="messageInput" placeholder="Nachricht…" />
        <button id="sendButton">Senden</button>
    </div>

    <!-- WICHTIG: Socket.io von CDN laden -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <!-- Dein Client -->
    <script src="client.js?v=100000"></script>

    <!-- Service Worker -->
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("service-worker.js");
        }
    </script>

</body>
</html>
