<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Plausch Bar</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
    <img src="icon-192.png" alt="Chat Icon" style="width:80px; height:auto; margin-bottom:15px;">
    <h2>👋❤️Willkommen in der Plausch Bar 👋❤️</h2>
    <p>Bitte deinen Vornamen und PIN (Geburtsjahr) eingeben und auf Start drücken</p>
    <p>🔐🖕 Die Seite ist verschlüsselt 🖕🔐</p>

    <input id="usernameInput" type="text" placeholder="Dein Name">
    <input id="pinInput" type="password" maxlength="4" placeholder="Deine PIN (Geburtsjahr)">
    <button id="loginBtn">Start</button>
</div>

<!-- CHAT SCREEN -->
<div id="chatScreen" style="display:none;">

    <!-- SIDEBAR DESKTOP -->
    <div id="sidebarDesktop">
        <h3>Kontakte</h3>
        <ul id="userListDesktop"></ul>
    </div>

    <!-- SIDEBAR MOBILE -->
    <div id="sidebarOverlay" class="hidden">
        <div id="sidebar">
            <button id="closeSidebarBtn">Schließen</button>
            <h3>Kontakte</h3>
            <ul id="userList"></ul>
        </div>
    </div>

    <!-- CHAT AREA -->
    <div id="chatArea">

        <div id="chatHeader">
            <button id="openSidebarBtn">☰</button>

            <div>
                <div id="chatAvatar">👤</div>
                <div id="chatTitle">Chat</div>
                <div id="chatSubTitle"></div>
                <div id="groupMembers"></div>
            </div>

            <div id="headerButtons">
                <button id="recordBtnHeader">🎙️</button>
                <button id="deleteChatBtn">🗑️</button>
                <button id="addToGroupBtn">➕</button>
                <button id="removeFromGroupBtn">➖</button>
            </div>
        </div>

        <div id="messages"></div>

        <div id="inputArea">

            <select id="emojiSelect">
                <option value="">🙂</option>
                <option value="😊">😊</option>
                <option value="😍">😍</option>
                <option value="😢">😢</option>
                <option value="😡">😡</option>
                <option value="👍">👍</option>
                <option value="👎">👎</option>
                <option value="🎉">🎉</option>
                <option value="🐱‍👤">🐱‍👤</option>
                <option value="❤️">❤️</option>
                <option value="🤡">🤡</option>
                <option value="🤮">🤮</option>
                <option value="🤢">🤢</option>
                <option value="😱">😱</option>
                <option value="💩">💩</option>
                <option value="😎">😎</option>
                <option value="😄">😄</option>
            </select>

            <input id="messageInput" placeholder="Nachricht…">

            <input id="fileInput" type="file" style="display:none;">
            <button id="fileBtn">📎</button>

            <button id="sendBtn">➤</button>
        </div>

    </div>
</div>

<!-- SCRIPTS -->

<!-- WICHTIG: Socket.io von CDN -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<!-- CryptoJS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<!-- Dein Client -->
<script src="client.js?v=100000"></script>

</body>
</html>
