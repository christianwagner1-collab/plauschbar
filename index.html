<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Plausch Bar</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0d1b2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="/icon-192.png">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css?v=2000">
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-container">
    <div class="login-box">
        <div class="login-icon">💬</div>
        <h2>Willkommen in der Plausch Bar</h2>
        <p>Bitte deinen Vornamen und PIN (Geburtsjahr) eingeben</p>

        <input id="usernameInput" type="text" placeholder="Dein Name">
        <input id="pinInput" type="password" maxlength="4" placeholder="Deine PIN (Geburtsjahr)">
        <button id="loginBtn" class="btn-primary">Start</button>
    </div>
</div>

<!-- MAIN CHAT SCREEN -->
<div id="chatScreen" class="app hidden">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
        <header class="sidebar-header">
            <div class="sidebar-title">Plausch Bar</div>
        </header>

        <div class="sidebar-section">
            <h3>👥 Gruppen</h3>
            <ul id="groupListDesktop" class="list"></ul>
        </div>

        <div class="sidebar-section">
            <h3>👤 Kontakte</h3>
            <ul id="userListDesktop" class="list"></ul>
        </div>
    </aside>

    <!-- CHAT AREA -->
    <main id="chatArea" class="chat-area">

        <!-- CHAT HEADER -->
        <div id="chatHeader" class="chat-header">
            <div class="chat-header-left">
                <div id="chatAvatar" class="chat-avatar">👤</div>
                <div>
                    <div id="chatTitle" class="chat-title">Chat</div>
                    <div id="chatSubTitle" class="chat-subtitle"></div>
                </div>
            </div>

            <div class="chat-header-right">
                <button id="recordBtnHeader" class="icon-btn">🎙️</button>
                <button id="deleteChatBtn" class="icon-btn">🗑️</button>
            </div>
        </div>

        <!-- MESSAGES -->
        <div id="messages" class="messages"></div>

        <!-- INPUT AREA -->
        <div id="inputArea" class="input-area">
            <select id="emojiSelect" class="emoji-select">
                <option value="">🙂</option>
                <option value="😊">😊</option>
                <option value="😍">😍</option>
                <option value="😢">😢</option>
                <option value="😡">😡</option>
                <option value="👍">👍</option>
                <option value="🎉">🎉</option>
                <option value="❤️">❤️</option>
                <option value="😎">😎</option>
                <option value="💩">💩</option>
            </select>

            <input id="messageInput" class="message-input" placeholder="Nachricht schreiben…">

            <button id="fileBtn" class="icon-btn">📎</button>
            <input id="fileInput" type="file" accept="image/*,video/*" hidden>

            <button id="sendBtn" class="btn-send">➤</button>
        </div>

    </main>
</div>

<!-- SCRIPTS -->
<script src="/socket.io/socket.io.js"></script>
<script src="client.js?v=2000"></script>

</body>
</html>
